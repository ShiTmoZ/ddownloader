name: دانلود از یوتیوب

on:
  workflow_dispatch:
    inputs:
      url:
        description: '🎬 لینک ویدیو'
        required: true
        default: ''
      quality:
        description: '📊 کیفیت'
        required: false
        type: choice
        default: '1080p'
        options:
          - '2160p (4K)'
          - '1080p (Full HD)'
          - '720p (HD)'
          - '480p'
          - '360p'
          - 'mp3 (فقط صدا)'

permissions:
  contents: write

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - name: 📦 Checkout مخزن
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 🔧 نصب yt-dlp
        run: |
          sudo apt-get update && sudo apt-get install -y ffmpeg
          sudo curl -L https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp -o /usr/local/bin/yt-dlp
          sudo chmod a+rx /usr/local/bin/yt-dlp

      - name: ⬇️ دانلود
        run: |
          mkdir -p yt
          
          Q="${{ github.event.inputs.quality }}"
          
          if [ "$Q" = "mp3 (فقط صدا)" ]; then
            yt-dlp -f bestaudio --extract-audio --audio-format mp3 \
              -o "yt/%(title)s.%(ext)s" \
              "${{ github.event.inputs.url }}"
          elif [ "$Q" = "2160p (4K)" ]; then
            yt-dlp -f "bestvideo[height<=2160]+bestaudio/best" \
              --merge-output-format mp4 \
              -o "yt/%(title)s.%(ext)s" \
              "${{ github.event.inputs.url }}"
          else
            HEIGHT=$(echo "$Q" | grep -oP '\d+')
            yt-dlp -f "bestvideo[height<=${HEIGHT}]+bestaudio/best" \
              --merge-output-format mp4 \
              -o "yt/%(title)s.%(ext)s" \
              "${{ github.event.inputs.url }}"
          fi
          
          echo "✅ دانلود تموم شد:"
          ls -lh yt/

      - name: 💾 Commit و Push به مخزن
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          git add yt/
          
          if git diff --staged --quiet; then
            echo "ℹ️ فایل جدیدی وجود نداره"
          else
            git commit -m "🎬 دانلود از یوتیوب - $(date +'%Y-%m-%d %H:%M')"
            
            # ۵ بار تلاش برای push
            for i in $(seq 1 5); do
              git pull --rebase origin main 2>/dev/null || true
              if git push origin main; then
                echo "✅ Push موفق!"
                break
              else
                echo "⏳ تلاش $i ناموفق - صبر ۱۰ ثانیه..."
                sleep 10
              fi
            done
          fi

      - name: 📤 آپلود artifact (پشتیبان)
        uses: actions/upload-artifact@v4
        with:
          name: youtube-video
          path: yt/
          retention-days: 7
